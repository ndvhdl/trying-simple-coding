<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>סודוקו לילדים - גרסה תקינה</title>
    <style>
        :root { --p: #007aff; --s: #34c759; --w: #ffcc00; --d: #2c3e50; }
        body { font-family: system-ui, sans-serif; text-align: center; background: #f4f7f9; margin: 0; padding: 10px; }
        .container { max-width: 450px; margin: auto; }
        
        .sudoku-grid { 
            display: grid; gap: 0; margin: 15px auto; 
            border: 3px solid var(--d); width: fit-content;
            background-color: var(--d); box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .sudoku-group { display: grid; background-color: transparent; border: 1px solid var(--d); }
        .sudoku-group:not(:nth-child(1)) { border-top: 3px solid var(--d); }
        
        input { 
            width: 42px; height: 42px; text-align: center; font-size: 18px; 
            border: 1px solid #ccc; font-weight: bold; background: white; 
            color: var(--p); -webkit-appearance: none; box-sizing: border-box;
        }
        .fixed { background: #e9ecef; color: var(--d); }
        
        /* מבנה הרמות */
        .grid-4 { grid-template-columns: repeat(2, auto); }
        .grid-4 .sudoku-group { grid-template-columns: repeat(2, auto); }
        .grid-6 { grid-template-columns: repeat(2, auto); }
        .grid-6 .sudoku-group { grid-template-columns: repeat(3, auto); }
        .grid-9 { grid-template-columns: repeat(3, auto); }
        .grid-9 .sudoku-group { grid-template-columns: repeat(3, auto); }

        .controls { display: flex; justify-content: center; gap: 8px; margin: 15px 0; }
        button { padding: 10px 15px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .btn-blue { background: var(--p); color: white; }
        .btn-yellow { background: var(--w); }
        .btn-green { background: var(--s); color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h3>סודוקו לילדים 🧩</h3>
        <div class="controls">
            <button class="btn-blue" onclick="initGame(4)">4x4</button>
            <button class="btn-blue" onclick="initGame(6)">6x6</button>
            <button class="btn-blue" onclick="initGame(9)">9x9</button>
        </div>
        <div id="sudoku-board" class="sudoku-grid"></div>
        <div class="controls">
            <button class="btn-yellow" onclick="giveHint()">רמז 💡</button>
            <button class="btn-green" onclick="checkSolution()">בדיקה ✅</button>
        </div>
        <p id="msg"></p>
    </div>

<script>
    // לוחות תקינים מתמטית (פתרון אמת)
    const validSolutions = {
        4: [1,2,3,4, 3,4,1,2, 2,3,4,1, 4,1,2,3],
        6: [1,2,3,4,5,6, 4,5,6,1,2,3, 2,1,5,6,3,4, 5,6,4,2,3,1, 3,4,2,5,6,1, 6,3,1,4,2,5],
        9: [5,3,4,6,7,8,9,1,2, 6,7,2,1,9,5,3,4,8, 1,9,8,3,4,2,5,6,7, 8,5,9,7,6,1,4,2,3, 4,2,6,8,5,3,7,9,1, 7,1,3,9,2,4,8,5,6, 9,6,1,5,3,7,2,8,4, 2,8,7,4,1,9,6,3,5, 3,4,5,2,8,6,1,7,9]
    };
    let solution = [];

    function initGame(size) {
        const board = document.getElementById('sudoku-board');
        board.innerHTML = '';
        board.className = `sudoku-grid grid-${size}`;
        document.getElementById('msg').innerText = '';
        solution = [...validSolutions[size]];

        let groups = size === 4 ? 4 : (size === 6 ? 6 : 9);
        for (let g = 0; g < groups; g++) {
            let groupDiv = document.createElement('div');
            groupDiv.className = 'sudoku-group';
            board.appendChild(groupDiv);
            for (let i = 0; i < size; i++) {
                let input = document.createElement('input');
                input.type = 'number';
                // חשיפת 45% מהלוח
                if (Math.random() > 0.55) {
                    input.value = solution[g * size + i];
                    input.readOnly = true;
                    input.classList.add('fixed');
                }
                input.dataset.index = g * size + i;
                groupDiv.appendChild(input);
            }
        }
    }

    function checkSolution() {
        let allCorrect = true;
        document.querySelectorAll('input').forEach(input => {
            if (input.value != solution[input.dataset.index]) allCorrect = false;
        });
        document.getElementById('msg').innerText = allCorrect ? "כל הכבוד! 🎉" : "נסו שוב 💪";
    }

    function giveHint() {
        let empty = [...document.querySelectorAll('input:not([readOnly])')].filter(i => i.value == "");
        if (empty.length) {
            let el = empty[0];
            el.value = solution[el.dataset.index];
        }
    }

    initGame(4);
</script>
</body>
</html>
