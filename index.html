<!DOCTYPE html>

<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>סודוקו לילדים</title>
    <style>
        :root { --d: #2c3e50; --p: #007aff; }
        body { font-family: sans-serif; text-align: center; background: #f4f7f9; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        h3 { margin: 8px 0; color: var(--d); }
        .score { font-size: 1.2rem; font-weight: bold; margin: 6px; color: var(--d); }
        .sudoku-board { 
            display: grid; border: 3px solid var(--d); background-color: var(--d); 
            gap: 2px; width: 95vw; max-width: 400px; aspect-ratio: 1/1;
        }
        .sub-grid { display: grid; background: var(--d); gap: 1px; }
        input { 
            width: 100%; height: 100%; text-align: center; font-size: clamp(0.9rem, 3vw, 1.4rem);
            border: none; font-weight: bold; background: white; color: var(--p);
            box-sizing: border-box; outline: none; -moz-appearance: textfield;
            caret-color: transparent;
        }
        input::-webkit-inner-spin-button, input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input.fixed { background: #e9ecef; color: var(--d); cursor: default; }
        input.hint { color: #27ae60; }
        input.error { background: #fde8e8; }
        .controls { margin-top: 12px; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; width: 100%; }
        button { padding: 10px 15px; cursor: pointer; border-radius: 8px; border: 2px solid transparent; font-weight: bold; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.12); transition: 0.15s; font-size: 0.9rem; }
        button:active { transform: scale(0.95); }
        button.active-btn { border-color: var(--p); background: #e8f0fe; }
        .btn-check { background: var(--d); color: white; }
        .btn-hint { background: #ffcc00; }
        #status { min-height: 1.4em; margin: 8px 0; font-weight: bold; font-size: 1rem; color: var(--d); }
        .loading { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>
    <h3>סודוקו לילדים 🧩</h3>
    <div class="score">ניצחונות: <span id="win-count">0</span></div>
    <div id="status"></div>
    <div id="board" class="sudoku-board"></div>

```
<div class="controls">
    <button id="btn-4e" onclick="startGame(4,'easy')">4x4 קל</button>
    <button id="btn-4h" onclick="startGame(4,'hard')">4x4 קשה</button>
    <button id="btn-6e" onclick="startGame(6,'easy')">6x6 קל</button>
    <button id="btn-6h" onclick="startGame(6,'hard')">6x6 קשה</button>
    <button id="btn-9e" onclick="startGame(9,'easy')">9x9 קל</button>
    <button id="btn-9h" onclick="startGame(9,'hard')">9x9 קשה</button>
</div>
<div class="controls">
    <button class="btn-hint" onclick="giveHint()">רמז 💡</button>
    <button class="btn-check" onclick="checkSolution()">בדיקה ✅</button>
</div>
```

<script>
let wins = 0;
let solution = [];
let currentSize = 4;
let boxR = 2, boxC = 2;
let activeBtn = null;

// ── Sudoku Generator ────────────────────────────────────────────────────────

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

/** Check if placing `num` at (row,col) is valid on `board` */
function isValid(board, size, bR, bC, row, col, num) {
    for (let i = 0; i < size; i++) {
        if (board[row][i] === num) return false;
        if (board[i][col] === num) return false;
    }
    const startR = Math.floor(row / bR) * bR;
    const startC = Math.floor(col / bC) * bC;
    for (let r = startR; r < startR + bR; r++)
        for (let c = startC; c < startC + bC; c++)
            if (board[r][c] === num) return false;
    return true;
}

/** Fill board with a complete valid solution (backtracking + shuffle) */
function fillBoard(board, size, bR, bC) {
    for (let row = 0; row < size; row++) {
        for (let col = 0; col < size; col++) {
            if (board[row][col] === 0) {
                const nums = shuffle([...Array(size)].map((_, i) => i + 1));
                for (const num of nums) {
                    if (isValid(board, size, bR, bC, row, col, num)) {
                        board[row][col] = num;
                        if (fillBoard(board, size, bR, bC)) return true;
                        board[row][col] = 0;
                    }
                }
                return false;
            }
        }
    }
    return true;
}

/**
 * Count solutions up to `limit`. Stops early once limit is exceeded.
 * Returns the count (0, 1, or 2+).
 */
function countSolutions(board, size, bR, bC, limit = 2) {
    let count = 0;
    function solve() {
        if (count >= limit) return;
        for (let row = 0; row < size; row++) {
            for (let col = 0; col < size; col++) {
                if (board[row][col] === 0) {
                    for (let num = 1; num <= size; num++) {
                        if (isValid(board, size, bR, bC, row, col, num)) {
                            board[row][col] = num;
                            solve();
                            board[row][col] = 0;
                            if (count >= limit) return;
                        }
                    }
                    return; // no valid num → dead end
                }
            }
        }
        count++; // reached the end with all cells filled
    }
    solve();
    return count;
}

/**
 * Remove cells one by one (in random order) while keeping a UNIQUE solution.
 * `targetClues` = number of given cells to KEEP.
 */
function generatePuzzle(fullBoard, size, bR, bC, targetClues) {
    // deep copy
    const puzzle = fullBoard.map(r => [...r]);
    const positions = shuffle([...Array(size * size)].map((_, i) => i));

    let removed = 0;
    const toRemove = size * size - targetClues;

    for (const pos of positions) {
        if (removed >= toRemove) break;
        const row = Math.floor(pos / size);
        const col = pos % size;
        const backup = puzzle[row][col];
        puzzle[row][col] = 0;

        const copy = puzzle.map(r => [...r]);
        if (countSolutions(copy, size, bR, bC, 2) === 1) {
            removed++;
        } else {
            puzzle[row][col] = backup; // restore — would break uniqueness
        }
    }
    return puzzle;
}

// ── Clue counts ─────────────────────────────────────────────────────────────
// Clues = cells that REMAIN visible (higher = easier)
const CLUES = {
    4: { easy: 10, hard: 7  },   // 16 total cells
    6: { easy: 22, hard: 15 },   // 36 total cells
    9: { easy: 35, hard: 26 },   // 81 total cells
};

// ── Box dimensions ───────────────────────────────────────────────────────────
const BOX = {
    4: { bR: 2, bC: 2 },
    6: { bR: 2, bC: 3 },
    9: { bR: 3, bC: 3 },
};

// ── Game Flow ────────────────────────────────────────────────────────────────

function startGame(size, difficulty) {
    currentSize = size;
    boxR = BOX[size].bR;
    boxC = BOX[size].bC;

    // highlight active button
    if (activeBtn) activeBtn.classList.remove('active-btn');
    activeBtn = document.getElementById(`btn-${size}${difficulty[0]}`);
    activeBtn.classList.add('active-btn');

    setStatus('יוצר לוח...', false);
    document.getElementById('board').classList.add('loading');

    // yield to browser to show "יוצר לוח..." before heavy computation
    setTimeout(() => {
        const emptyBoard = Array.from({length: size}, () => Array(size).fill(0));
        fillBoard(emptyBoard, size, boxR, boxC);

        // emptyBoard is now a full solution
        solution = emptyBoard.map(r => [...r]);

        const clues = CLUES[size][difficulty];
        const puzzle = generatePuzzle(emptyBoard, size, boxR, boxC, clues);

        renderBoard(puzzle, size, boxR, boxC);
        document.getElementById('board').classList.remove('loading');
        setStatus('');
    }, 30);
}

function renderBoard(puzzle, size, bR, bC) {
    const board = document.getElementById('board');
    board.innerHTML = '';

    const numBoxes = (size / bC) * (size / bR); // = size*size / (bR*bC) boxes? no...
    // Number of box-columns = size/bC, number of box-rows = size/bR
    const boxCols = size / bC; // e.g. 4/2=2, 6/3=2, 9/3=3
    const boxRows = size / bR;

    board.style.gridTemplateColumns = `repeat(${boxCols}, 1fr)`;
    board.style.gridTemplateRows    = `repeat(${boxRows}, 1fr)`;

    for (let brow = 0; brow < boxRows; brow++) {
        for (let bcol = 0; bcol < boxCols; bcol++) {
            const sg = document.createElement('div');
            sg.className = 'sub-grid';
            sg.style.gridTemplateColumns = `repeat(${bC}, 1fr)`;
            sg.style.gridTemplateRows    = `repeat(${bR}, 1fr)`;

            for (let i = 0; i < bR; i++) {
                for (let j = 0; j < bC; j++) {
                    const row = brow * bR + i;
                    const col = bcol * bC + j;
                    const inp = document.createElement('input');
                    inp.type = 'number';
                    inp.min = 1;
                    inp.max = size;
                    inp.dataset.row = row;
                    inp.dataset.col = col;

                    if (puzzle[row][col] !== 0) {
                        inp.value = puzzle[row][col];
                        inp.readOnly = true;
                        inp.classList.add('fixed');
                    } else {
                        inp.addEventListener('input', () => {
                            inp.classList.remove('error', 'hint');
                            // clamp to valid range
                            let v = parseInt(inp.value);
                            if (isNaN(v) || v < 1) inp.value = '';
                            else if (v > size) inp.value = size;
                        });
                    }
                    sg.appendChild(inp);
                }
            }
            board.appendChild(sg);
        }
    }
}

function checkSolution() {
    const inputs = document.querySelectorAll('input');
    let allFilled = true;
    let hasError = false;

    inputs.forEach(inp => {
        const v = parseInt(inp.value);
        const r = +inp.dataset.row, c = +inp.dataset.col;
        if (!v) { allFilled = false; return; }
        if (v !== solution[r][c]) {
            hasError = true;
            if (!inp.classList.contains('fixed')) inp.classList.add('error');
        } else {
            inp.classList.remove('error');
        }
    });

    if (!allFilled) {
        setStatus('הלוח עדיין לא מלא — המשך! 💪', false);
    } else if (hasError) {
        setStatus('יש כמה טעויות — בדוק שוב! 🔍', false);
    } else {
        wins++;
        document.getElementById('win-count').innerText = wins;
        setStatus('כל הכבוד! פתרת בהצלחה! 🎉', true);
    }
}

function giveHint() {
    const empty = Array.from(document.querySelectorAll('input:not(.fixed)')).filter(i => !i.value);
    if (!empty.length) { setStatus('הלוח מלא!'); return; }
    const target = empty[Math.floor(Math.random() * empty.length)];
    target.value = solution[+target.dataset.row][+target.dataset.col];
    target.classList.add('hint');
    target.classList.remove('error');
}

function setStatus(msg, good = false) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.style.color = good ? '#27ae60' : 'var(--d)';
}

// Start with easy 4x4
startGame(4, 'easy');
</script>

</body>
</html>
